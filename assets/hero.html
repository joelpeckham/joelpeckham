<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joel Peckham — profile hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Jost:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: #f1ebdd;
      }
      .hero {
        position: relative;
        overflow: hidden;
        width: 1100px;
        height: 520px;
        background: #f1ebdd;
        border-bottom: 3px solid #141210;
        color: #141210;
      }
      .shape-blue {
        position: absolute;
        right: -70px;
        top: -70px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: #1f45d8;
      }
      .shape-yellow {
        position: absolute;
        right: 80px;
        bottom: -70px;
        width: 220px;
        height: 110px;
        border-radius: 220px 220px 0 0;
        background: #f7c000;
        border: 3px solid #141210;
        border-bottom: none;
      }
      .shape-red {
        position: absolute;
        right: 280px;
        top: 50%;
        width: 0;
        height: 0;
        border-left: 44px solid transparent;
        border-right: 44px solid transparent;
        border-bottom: 80px solid #e1352a;
        transform: translateY(-50%) rotate(18deg);
      }
      .copy {
        position: relative;
        z-index: 1;
        padding: 64px 56px 56px;
        max-width: 900px;
      }
      .label {
        display: block;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #6b6560;
      }
      h1 {
        margin: 14px 0 0;
        font-family: Jost, Futura, "Century Gothic", system-ui, sans-serif;
        font-size: 92px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.02em;
        text-transform: uppercase;
      }
      h1 .accent {
        color: #e1352a;
      }
    </style>
  </head>
  <body>
    <section class="hero" id="hero">
      <span class="shape-blue" aria-hidden="true"></span>
      <span class="shape-yellow" aria-hidden="true"></span>
      <span class="shape-red" aria-hidden="true"></span>
      <div class="copy">
        <span class="label">Joel Peckham · Full-stack · AI · Laramie, WY</span>
        <h1>
          I make<br />
          software<br />
          that helps<br />
          <span class="accent">people.</span>
        </h1>
      </div>
    </section>
  </body>
</html>
